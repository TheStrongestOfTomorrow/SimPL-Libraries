name: 📦 Library Submission
description: Submit a new SimPL library to the registry. All fields are validated automatically.
title: "[Package] <package_name> v<version>"
labels: ["library-submission"]
body:
  - type: input
    id: package_name
    attributes:
      label: Package Name
      description: "Lowercase letters, numbers, and hyphens only (e.g., super-math)"
      placeholder: "my-awesome-lib"
    validations:
      required: true
      regex: '^[a-z0-9]+(-[a-z0-9]+)*$'
      error_message: "Package name must contain only lowercase letters, numbers, and hyphens (e.g., 'super-math')"

  - type: input
    id: version
    attributes:
      label: Version
      description: "Semantic versioning format (MAJOR.MINOR.PATCH)"
      placeholder: "1.0.0"
    validations:
      required: true
      regex: '^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$'
      error_message: "Version must follow semantic versioning (e.g., 1.0.0, 2.1.3-beta)"

  - type: input
    id: author
    attributes:
      label: Author
      description: "Your GitHub username"
      placeholder: "@your-username"
    validations:
      required: true

  - type: dropdown
    id: license
    attributes:
      label: License
      description: "Select the license for your library"
      options:
        - MIT
        - Apache-2.0
        - GPL-3.0
        - Unlicense
      default: 0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: "Brief description of your library (max 150 characters)"
      placeholder: "A collection of mathematical utilities for SimPL"
      render: plain text
    validations:
      required: true

  - type: input
    id: dependencies
    attributes:
      label: Dependencies
      description: "Comma-separated list of other SimPL packages this library depends on (optional)"
      placeholder: "http-client, json-utils"
    validations:
      required: false

  - type: input
    id: tags
    attributes:
      label: Tags
      description: "Comma-separated tags to help users discover your library (optional)"
      placeholder: "math, utility, beginner"
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        ## 📦 Code
        
        Paste your complete SimPL library code below. Use triple backticks with `simpl` syntax highlighting:
        
        ```simpl
        -- Your library code here
        ```

  - type: textarea
    id: code
    attributes:
      label: Library Code
      description: "Paste your complete SimPL library code here"
      render: simpl
      placeholder: |
        -- ============================================
        -- Package: my-awesome-lib
        -- Version: 1.0.0
        -- Author: @your-username
        -- License: MIT
        -- ============================================

        -- Your SimPL code here

    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## 📖 Documentation
        
        Please provide clear documentation for your library.

  - type: textarea
    id: installation
    attributes:
      label: Installation
      description: "How to install and set up your library"
      placeholder: |
        ```simpl
        import my-awesome-lib
        ```
      render: plain text
    validations:
      required: true

  - type: textarea
    id: usage
    attributes:
      label: Usage
      description: "Examples showing how to use your library"
      placeholder: |
        ```simpl
        let result = my-awesome-lib::do_something(42)
        print(result)
        ```
      render: plain text
    validations:
      required: true

  - type: textarea
    id: api_reference
    attributes:
      label: API Reference
      description: "Document all public functions, types, and constants"
      placeholder: |
        ### Functions
        
        #### `do_something(value: Int) -> Int`
        Performs an operation on the given value.
        
        **Parameters:**
        - `value`: The input integer
        
        **Returns:**
        - The processed integer
      render: plain text
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## 📝 Changelog
        
        Document the changes in this version.

  - type: textarea
    id: changelog
    attributes:
      label: Changelog
      description: "What's new in this version?"
      placeholder: |
        ### v1.0.0
        - Initial release
        - Added `do_something` function
        - Added `helper_utility` function
      render: plain text
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Submission Checklist
      description: "By submitting this library, you confirm:"
      options:
        - label: "All code is written in pure SimPL"
          required: true
        - label: "No malicious system calls or harmful code"
          required: true
        - label: "Code is beginner-friendly and well-documented"
          required: true
        - label: "I have tested this code and it works as described"
          required: true
        - label: "This library does not violate any licenses"
          required: true
    validations:
      required: true
